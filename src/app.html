<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<!--
			Pre-paint theme. External file so script-src 'self' covers it on
			csr=false pages. Must be synchronous and run before SvelteKit injects
			its own head content, so data-theme is set before first paint.
			NOTE: do not write the literal placeholder name inside this comment;
			SvelteKit string-substitutes it even inside comments and that breaks
			the HTML comment's structure.
		-->
		<script src="/theme-init.js"></script>

		<!-- JSON-LD Person schema. Search engines + LLM crawlers use this to
		     understand who the page describes. Update the URL once the domain is
		     wired; sameAs lists every authoritative profile that confirms identity. -->
		<script type="application/ld+json">
			{
				"@context": "https://schema.org",
				"@type": "Person",
				"name": "Saheed Faremi",
				"alternateName": "fayisode",
				"jobTitle": "Researcher & Software Engineer",
				"description": "PhD-track EEG-microstate researcher and full-stack engineer building production systems in fintech, healthcare, education, HR, and agriculture.",
				"url": "https://saheedfaremi.com",
				"address": {
					"@type": "PostalAddress",
					"addressLocality": "Dublin",
					"addressCountry": "IE"
				},
				"sameAs": [
					"https://github.com/fayisode",
					"https://www.linkedin.com/in/faremi-saheed",
					"https://scholar.google.com/citations?user=tw1P0nsAAAAJ",
					"https://orcid.org/0009-0007-8428-7019",
					"https://www.researchgate.net/profile/Saheed-Faremi-2",
					"https://medium.com/@sonirudrakshi99/unesco-india-africa-hackathon-2022-2ec88cea6eb9"
				]
			}
		</script>

		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover">
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
