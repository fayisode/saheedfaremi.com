name: Azure Static Web Apps CI/CD

on:
  push:
    branches:
      - main
  pull_request:
    types: [opened, synchronize, reopened, closed]
    branches:
      - main

jobs:
  build_and_deploy_job:
    if: github.event_name == 'push' || (github.event_name == 'pull_request' && github.event.action != 'closed')
    runs-on: ubuntu-latest
    name: Build and Deploy Job
    permissions:
       id-token: write
       contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: false
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'pnpm'
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Check (svelte-check + TS)
        run: pnpm run check
      - name: Lint (prettier + eslint)
        run: pnpm run lint
      - name: Build
        run: pnpm run build
      - name: Get Id Token
        uses: actions/github-script@v6
        id: idtoken
        with:
           # github-script@v6 bundles @actions/core (^1.10.0), so no npm
           # install step is needed. The previous "Install OIDC Client" step
           # ran npm on top of pnpm's node_modules, which risked polluting the
           # dependency tree before the deploy step.
           script: |
               const core = require('@actions/core')
               return await core.getIDToken()
           result-encoding: string
      - name: Deploy
        id: builddeploy
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_WHITE_DUNE_01E76C910 }}
          action: "upload"
          # Build already ran via pnpm on the runner above. Oryx (the Azure
          # action's built-in builder) does NOT support pnpm and would re-run
          # npm install on top of the symlinked node_modules, causing ERESOLVE
          # conflicts. skip_app_build tells it to upload the pre-built build/
          # folder without running its own install or build.
          app_location: "build"
          api_location: ""
          output_location: ""
          skip_app_build: true
          github_id_token: ${{ steps.idtoken.outputs.result }}

  close_pull_request_job:
    if: github.event_name == 'pull_request' && github.event.action == 'closed'
    runs-on: ubuntu-latest
    name: Close Pull Request Job
    steps:
      - name: Close Pull Request
        id: closepullrequest
        uses: Azure/static-web-apps-deploy@v1
        with:
          action: "close"
